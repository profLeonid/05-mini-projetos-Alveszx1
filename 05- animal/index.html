<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de IMC</title>
  <link rel="stylesheet" href="style.css" />
  <script src="./app.js" defer></script>

</head>

<body>

  <main>
    <div class="conteudo">

      <a href="../index.html" class="voltar">← Voltar</a>

      <h1>
        Descobrir
        <span>Animal</span>
      </h1>
      <p class="descricao">Informe as caracteristicas para classificar o animal .</p>

      <label>Vertebras</label>

      <select name="verterbras" id="vertebra" onchange="definirEscolha()">
        <option  >Escolha</option>
        <option value="vertebrado" >Vertebrado</option>
        <option value="invertebrado" >Invertebrado</option>
      </select>

      <label>Classe Animal </label>
      <select name="classe" id="classe">
        <option value="escolha">Escolha</option>
      </select>

      <label>Alimentação </label>
      <select name="alimentacao" id="alimentacao">
        <option value="">Escolha</option>
      </select>
      
      
      

      <button onclick="">Definir Animal</button>

      <div class="resultado" id="resultado">
        O resultado aparecerá aqui
      </div>

    </div>
  </main>

  <footer>
    <p>Prof. Fernando Leonid</p>
  </footer>

</body>

</html>
